<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#1589ee"/>
      <stop offset="100%" style="stop-color:#032d60"/>
    </linearGradient>
  </defs>
  <!-- Salesforce-style cloud: overlapping circles + rect base -->
  <!-- Top bumps -->
  <circle cx="64" cy="46" r="26" fill="url(#cloudGrad)"/>
  <circle cx="42" cy="54" r="20" fill="url(#cloudGrad)"/>
  <circle cx="86" cy="54" r="20" fill="url(#cloudGrad)"/>
  <circle cx="28" cy="66" r="15" fill="url(#cloudGrad)"/>
  <circle cx="100" cy="66" r="15" fill="url(#cloudGrad)"/>
  <!-- Cloud body fill -->
  <rect x="13" y="65" width="102" height="32" fill="url(#cloudGrad)" rx="16"/>
  <!-- Magnifying glass - white -->
  <!-- Lens circle -->
  <circle cx="56" cy="63" r="20" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Inner crosshair (scout reticle) -->
  <line x1="56" y1="55" x2="56" y2="61" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <line x1="56" y1="65" x2="56" y2="71" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <line x1="48" y1="63" x2="54" y2="63" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <line x1="58" y1="63" x2="64" y2="63" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <!-- Handle -->
  <line x1="71" y1="78" x2="88" y2="95" stroke="white" stroke-width="8" stroke-linecap="round"/>
</svg>